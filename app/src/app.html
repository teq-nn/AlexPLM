<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%sveltekit.assets%/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Werkbank</title>
    <!-- Boot splash (Issue #114): painted by the WebView BEFORE the SvelteKit bundle +
         hydration arrive, so the first frame is the warm chassis surface instead of a black
         void. No JS bundle, no spinner — just a quiet "die Werkbank fährt hoch". Tokens are
         inlined here (verbatim from tokens.css) because this paints before tokens.css loads.
         #page.svelte fades it out on mount via the .booted class. -->
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: #e4e2dc; /* --surface-base */
      }
      #boot {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #e4e2dc; /* --surface-base */
        /* faded out by the mounted app; until then it covers the blank WebView */
        opacity: 1;
        transition: opacity 240ms cubic-bezier(0.32, 0.72, 0.3, 1);
      }
      body.booted #boot {
        opacity: 0;
        pointer-events: none;
      }
      #boot .hint {
        font-family: "Archivo", system-ui, sans-serif;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        font-size: 11px;
        font-weight: 600;
        line-height: 1.2;
        color: #6b6864; /* --ink-muted */
      }
      @media (prefers-reduced-motion: reduce) {
        #boot {
          transition: none;
        }
      }
    </style>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <!-- Sibling of the SvelteKit body — Svelte never owns or rehydrates this node, so it stays
         on screen through hydration and is removed once the app has mounted. -->
    <div id="boot" aria-hidden="true"><span class="hint">Werkbank fährt hoch</span></div>
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>

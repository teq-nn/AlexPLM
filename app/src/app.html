<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%sveltekit.assets%/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Werkbank</title>
    <!-- Boot splash (Issue #114): painted by the WebView BEFORE the SvelteKit bundle +
         hydration arrive, so the first frame is the warm chassis surface instead of a black
         void. No JS bundle, no spinner — just a quiet "die Werkbank fährt hoch". Tokens are
         inlined here (verbatim from tokens.css) because this paints before tokens.css loads.
         #page.svelte fades it out on mount via the .booted class.

         IMPLEMENTED AS body::before, NOT a DOM node: a real #boot element placed as a sibling
         inside the body ahead of the SvelteKit mount point breaks Svelte 5's hydration — its
         root walker steps onto the unexpected sibling and throws next_sibling_getter.call(undefined),
         the app never mounts, and the splash hangs forever. A pseudo-element is not in the hydration
         tree, so it paints just as early but the walker never sees it.
         NB: never write the sveltekit body/head placeholder tokens in this comment — the template
         engine substitutes the first match anywhere in the file, so a token here would hijack the
         real bootstrap script and bury it inside this comment (browser never runs it). -->
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: #e4e2dc; /* --surface-base */
      }
      body::before {
        content: "Werkbank fährt hoch";
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #e4e2dc; /* --surface-base */
        font-family: "Archivo", system-ui, sans-serif;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        font-size: 11px;
        font-weight: 600;
        line-height: 1.2;
        color: #6b6864; /* --ink-muted */
        /* faded out by the mounted app; until then it covers the blank WebView */
        opacity: 1;
        transition: opacity 240ms cubic-bezier(0.32, 0.72, 0.3, 1);
      }
      body.booted::before {
        opacity: 0;
        pointer-events: none;
      }
      @media (prefers-reduced-motion: reduce) {
        body::before {
          transition: none;
        }
      }
    </style>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
